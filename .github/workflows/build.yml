  name: Build aar And apk

  on:
    push:
    pull_request:
    workflow_dispatch:

  permissions:
    contents: read

  concurrency:
    group: android-build-${{ github.ref }}
    cancel-in-progress: true

  jobs:
    build:
      runs-on: ubuntu-24.04
      timeout-minutes: 30

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Setup JDK 17
          uses: actions/setup-java@v4
          with:
            distribution: temurin
            java-version: "17"

        - name: Setup Android SDK
          uses: android-actions/setup-android@v3

        - name: Install Android SDK, CMake and NDK
          shell: bash
          run: |
            run_sdkmanager_with_yes() {
              set +e +o pipefail
              yes | sdkmanager "$@"
              status=${PIPESTATUS[1]}
              set -e -o pipefail
              return "$status"
            }

            run_sdkmanager_with_yes --licenses >/dev/null

            sdkmanager --install \
              "platform-tools" \
              "platforms;android-35" \
              "build-tools;35.0.0" \
              "cmake;3.22.1" \
              "ndk;29.0.13113456"

        - name: Setup Gradle cache
          uses: gradle/actions/setup-gradle@v4

        - name: Make Gradle wrapper executable
          shell: bash
          run: chmod +x ./gradlew

        - name: Build project
          shell: bash
          run: ./gradlew --no-daemon --stacktrace assemble

        - name: Upload build outputs
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: android-build-outputs
            path: |
              **/build/outputs/**/*.apk
              **/build/outputs/**/*.aar
              **/build/reports/**
            if-no-files-found: ignore
